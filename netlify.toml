[build]
  publish = "public"
  functions = "netlify/functions"

# NÃO use o redirecionamento /* para /index.html se você tem várias páginas HTML, 
# pois isso vai fazer todas as páginas carregarem o index.

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200