<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisando Crédito | LivePix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-live { color: #2DD4BF; }
        .text-pix { color: #3B82F6; }
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
        /* Efeito de pulso para o ícone de carregamento */
        .pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <div class="text-3xl font-bold tracking-tighter">
                <span class="text-live">Live</span><span class="text-pix">Pix</span>
            </div>
        </div>

        <div id="loading-content">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 border-4 border-teal-100 border-t-teal-500 rounded-full animate-spin"></div>
            </div>
            
            <h2 class="text-xl font-bold text-center text-gray-800 mb-2">
                Analisando Perfil...
            </h2>
            <p id="status-text" class="text-center text-gray-500 text-sm mb-6 h-5">
                Iniciando consulta de dados...
            </p>

            <div class="w-full bg-gray-100 rounded-full h-3 mb-4 overflow-hidden">
                <div id="progress" class="bg-teal-500 h-full progress-bar" style="width: 0%"></div>
            </div>
            
            <div class="text-center text-xs text-gray-400 italic">
                Aguarde, não feche esta página.
            </div>
        </div>

        <div id="result-content" class="hidden text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Parabéns, <span id="target-name" class="text-teal-600">Cliente</span>!</h2>
            <p class="text-gray-600 mb-6">Seu crédito de <strong id="target-value" class="text-gray-800">R$ 0,00</strong> foi <span class="bg-green-100 text-green-700 px-2 py-1 rounded font-bold">PRÉ-APROVADO</span>.</p>
            
            <div class="bg-blue-50 p-4 rounded-xl mb-6 text-left border border-blue-100">
                <p class="text-xs text-blue-700 font-bold uppercase mb-2">Resumo da Proposta:</p>
                <div class="flex justify-between text-sm mb-1">
                    <span class="text-gray-600">Liberação:</span>
                    <span class="font-bold text-gray-800 italic">IMEDIATA via PIX</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-600">Aporte de Garantia (10%):</span>
                    <span class="font-bold text-blue-600" id="target-caucao">R$ 0,00</span>
                </div>
            </div>

            <button onclick="irParaCheckout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-105">
                LIBERAR MEU EMPRÉSTIMO AGORA
            </button>
        </div>
    </div>

    <script>
        const userName = localStorage.getItem('user_name') || 'Cliente';
        const loanAmount = parseFloat(localStorage.getItem('loan_amount')) || 0;
        const caucaoAmount = parseFloat(localStorage.getItem('caucao_amount')) || 0;

        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');
        const loadingContent = document.getElementById('loading-content');
        const resultContent = document.getElementById('result-content');

        const mensagens = [
            `Localizando cadastro para ${userName}...`,
            "Consultando limite disponível para negativados...",
            "Verificando margem de garantia...",
            "Validando score interno LivePix...",
            "Finalizando liberação do contrato..."
        ];

        let step = 0;
        const interval = setInterval(() => {
            if (step < mensagens.length) {
                statusText.innerText = mensagens[step];
                progressBar.style.width = ((step + 1) * 20) + '%';
                step++;
            } else {
                clearInterval(interval);
                mostrarResultado();
            }
        }, 1800); // Muda a cada 1.8 segundos para parecer real

        function mostrarResultado() {
            // Preenche os dados reais salvos no LocalStorage
            document.getElementById('target-name').innerText = userName.split(' ')[0]; // Só o primeiro nome
            document.getElementById('target-value').innerText = `R$ ${loanAmount.toLocaleString('pt-BR')}`;
            document.getElementById('target-caucao').innerText = `R$ ${caucaoAmount.toLocaleString('pt-BR')}`;

            // Troca as telas
            loadingContent.classList.add('hidden');
            resultContent.classList.remove('hidden');
        }

        function irParaCheckout() {
            window.location.href = "checkout.html";
        }
    </script>
</body>
</html>
